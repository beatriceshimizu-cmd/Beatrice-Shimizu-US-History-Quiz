<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="style.css"/>
    <script src="script.js" defer></script>
    <title>US History Quiz</title>
  </head>

  <body>
    <!-- START SCREEN -->
    <div id="start-screen" class="quiz-container">
      <h5 class="quiz-title">US History Quiz</h5>
      <button id="start-btn" class="btn start-btn" type="button">Start</button>
    </div>

    <!-- QUIZ (starts hidden until Start is clicked) -->
    <div class="quiz-container hide" id="quiz-box">
      <div id="question-container">
        <h3 id="question">Question</h3>
        <div id="answer-buttons"></div>
      </div>

      <button id="next-btn" class="btn hide" type="button">Next</button>
      <div id="result" class="hide"></div>
      <button id="restart-btn" class="btn hide" type="button">Restart</button>
    </div>
  </body>
</html>
